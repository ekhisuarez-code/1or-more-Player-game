<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SuarezCraft | Fix Final</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            background: #1a1a1a; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
        }
        .panel { 
            background: #c6c6c6; border: 4px solid #000; padding: 20px; color: #333; width: 300px; text-align: center;
            box-shadow: 8px 8px 0px #000;
        }
        h1 { color: #55ff55; text-shadow: 2px 2px #000; margin-top: 0; }
        select { 
            width: 100%; padding: 10px; margin: 10px 0; background: #8b8b8b; 
            color: white; border: 2px solid #000; font-weight: bold;
        }
        button { 
            width: 100%; padding: 10px; background: #55ff55; border: 2px solid #000; 
            font-weight: bold; cursor: pointer; 
        }
        button:hover { background: #32cd32; }
        #log { font-size: 12px; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

    <div class="panel">
        <h1>SUAREZCRAFT</h1>
        <p>Eres: <b><span id="player-tag">Conectando...</span></b></p>
        
        <label>Jugadores conectados:</label>
        <select id="player-dropdown">
            <option value="">Nadie conectado</option>
        </select>
        
        <button onclick="intentarUnirse()">UNIRSE A ESTE JUGADOR</button>
        <div id="log">Estado: Iniciando sistema...</div>
    </div>

    <script>
        let peer;
        let myId = "";
        const maxPlayers = 5;

        // Intentar conectar con un ID libre del 1 al 5
        async function conectar() {
            for (let i = 1; i <= maxPlayers; i++) {
                const tempId = "SuarezPlayer-" + i;
                const testPeer = new Peer(tempId);

                const result = await new Promise(resolve => {
                    testPeer.on('open', () => resolve({ok: true, p: testPeer}));
                    testPeer.on('error', () => resolve({ok: false}));
                });

                if (result.ok) {
                    peer = result.p;
                    myId = tempId;
                    document.getElementById('player-tag').innerText = "Jugador " + i;
                    document.getElementById('log').innerText = "Estado: En línea";
                    escucharInvitaciones();
                    setInterval(escanearRed, 3000); // Buscar otros cada 3 seg
                    break;
                }
            }
        }

        function escucharInvitaciones() {
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'JOIN') {
                        if (confirm("El Jugador " + data.num + " quiere entrar. ¿Aceptar?")) {
                            conn.send({ type: 'OK' });
                        }
                    }
                });
            });
        }

        function escanearRed() {
            const select = document.getElementById('player-dropdown');
            const actualValue = select.value;
            select.innerHTML = ""; // Limpiar

            let encontrados = 0;

            for (let i = 1; i <= maxPlayers; i++) {
                const target = "SuarezPlayer-" + i;
                if (target === myId) continue;

                const conn = peer.connect(target);
                conn.on('open', () => {
                    encontrados++;
                    const opt = document.createElement('option');
                    opt.value = target;
                    opt.innerText = "Jugador " + i;
                    select.appendChild(opt);
                    conn.close();
                });
            }

            setTimeout(() => {
                if (encontrados === 0) {
                    select.innerHTML = '<option value="">Nadie conectado</option>';
                }
            }, 1000);
        }

        function intentarUnirse() {
            const target = document.getElementById('player-dropdown').value;
            if (!target) return alert("Selecciona a alguien de la lista");

            const conn = peer.connect(target);
            conn.on('open', () => {
                conn.send({ type: 'JOIN', num: myId.split('-')[1] });
                document.getElementById('log').innerText = "Petición enviada...";
            });

            conn.on('data', (data) => {
                if (data.type === 'OK') {
                    alert("¡Te has unido al mundo!");
                }
            });
        }

        conectar();
    </script>
</body>
</html>
