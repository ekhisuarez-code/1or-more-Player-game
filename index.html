<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SuarezCraft | Multiplayer Lobby</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --mc-green: #55ff55; --mc-grey: #313131; }
        body { 
            background: #1a1a1a; color: white; font-family: 'Courier New', monospace;
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        /* --- MENÚ DESPLEGABLE --- */
        .dropdown {
            position: relative; display: inline-block; width: 250px;
        }

        .dropbtn {
            background-color: #c6c6c6; color: #333; padding: 12px;
            font-size: 16px; border: 4px solid #000; cursor: pointer;
            width: 100%; text-align: left; font-weight: bold;
        }

        .dropdown-content {
            display: none; position: absolute; background-color: #8b8b8b;
            width: 100%; border: 4px solid #000; z-index: 1; max-height: 200px; overflow-y: auto;
        }

        .dropdown-content div {
            color: white; padding: 10px; text-decoration: none; display: block;
            cursor: pointer; border-bottom: 2px solid #333;
        }

        .dropdown-content div:hover { background-color: var(--mc-green); color: black; }

        .show { display: block; }

        #info-panel { margin-bottom: 20px; text-align: center; }
        .badge { background: var(--mc-green); color: black; padding: 5px 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="info-panel">
        <h1 style="color: var(--mc-green);">SUAREZCRAFT</h1>
        <p>ESTADO: <span id="status" class="badge">IDENTIFICANDO...</span></p>
    </div>

    <div class="dropdown">
        <button onclick="toggleMenu()" class="dropbtn">JUGADORES ACTIVOS ▼</button>
        <div id="myDropdown" class="dropdown-content">
            <div style="color: #444; font-style: italic;">Buscando...</div>
        </div>
    </div>

    <script>
        let peer;
        let myNumber = 0;
        const totalSlots = 10; // Escaneamos hasta 10 posibles jugadores

        // Intentar encontrar un hueco libre (Jugador 1, 2, 3...)
        async function buscarHueco() {
            for (let i = 1; i <= totalSlots; i++) {
                const idPropuesta = "SuarezPlayer-" + i;
                const p = new Peer(idPropuesta);

                const success = await new Promise(resolve => {
                    p.on('open', () => resolve(true));
                    p.on('error', () => resolve(false));
                });

                if (success) {
                    peer = p;
                    myNumber = i;
                    document.getElementById('status').innerText = "ERES EL JUGADOR " + i;
                    iniciarLógica();
                    break;
                }
            }
        }

        function iniciarLógica() {
            // Escuchar cuando alguien nos intenta contactar
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'JOIN_REQUEST') {
                        if (confirm("El Jugador " + data.from + " quiere unirse a tu mundo. ¿Aceptar?")) {
                            conn.send({ type: 'JOIN_ACCEPTED' });
                        }
                    }
                });
            });

            // Actualizar la lista cada 3 segundos
            setInterval(actualizarLista, 3000);
        }

        function actualizarLista() {
            const dropdown = document.getElementById('myDropdown');
            dropdown.innerHTML = "";
            let encontrados = 0;

            for (let i = 1; i <= totalSlots; i++) {
                if (i === myNumber) continue;

                const targetId = "SuarezPlayer-" + i;
                const conn = peer.connect(targetId);

                conn.on('open', () => {
                    encontrados++;
                    const div = document.createElement('div');
                    div.innerText = "Jugador " + i;
                    div.onclick = () => unirseA(targetId, i);
                    dropdown.appendChild(div);
                });
            }

            setTimeout(() => {
                if (encontrados === 0) {
                    dropdown.innerHTML = "<div>No hay nadie más</div>";
                }
            }, 1000);
        }

        function unirseA(id, num) {
            const conn = peer.connect(id);
            conn.on('open', () => {
                conn.send({ type: 'JOIN_REQUEST', from: myNumber });
                alert("Enviando petición de unión al Jugador " + num + "...");
            });

            conn.on('data', (data) => {
                if (data.type === 'JOIN_ACCEPTED') {
                    alert("¡Petición aceptada! Entrando al mundo del Jugador " + num);
                    // Aquí cargarías el mapa 3D
                }
            });
        }

        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Cerrar el menú si se hace clic fuera
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                const dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) {
                        dropdowns[i].classList.remove('show');
                    }
                }
            }
        }

        buscarHueco();
    </script>
</body>
</html>
